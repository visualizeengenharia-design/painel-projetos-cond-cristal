<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Aprovação de Projetos — Cond. Cristal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
  :root {
    --bg: #F7F8FA; --surface: #FFFFFF; --border: #E2E6ED;
    --text-primary: #1A1F2E; --text-secondary: #5A6478; --text-muted: #9AA3B2;
    --accent: #1B4F8A; --accent-light: #EBF1FA;
    --green: #1A7F5A; --green-bg: #E6F5EF;
    --red: #C0392B; --red-bg: #FDECEA;
    --yellow: #B45309; --yellow-bg: #FEF3C7;
    --orange: #C05621; --orange-bg: #FEF0E7;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 14px; line-height: 1.5; }

  /* ALERTA GLOBAL */
  #global-alert {
    display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    background: linear-gradient(135deg, #1A7F5A 0%, #0F5C40 100%);
    color: #fff; padding: 18px 32px; text-align: center;
    font-size: 16px; font-weight: 600; letter-spacing: 0.02em;
    box-shadow: 0 4px 20px rgba(26,127,90,0.4); animation: slideDown 0.4s ease;
  }
  #global-alert .alert-close {
    position: absolute; right: 24px; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 14px;
  }
  @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

  /* HEADER */
  header { background: var(--accent); color: #fff; padding: 0; }
  .header-inner {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 32px; gap: 20px; flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo-img { height: 56px; width: auto; background: #fff; border-radius: 10px; padding: 6px 10px; }
  .header-divider { width: 1px; height: 48px; background: rgba(255,255,255,0.2); }
  .header-titles h1 { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; }
  .header-titles .subtitle { font-size: 12px; opacity: 0.65; margin-top: 2px; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .header-meta { font-size: 11px; opacity: 0.65; font-family: 'DM Mono', monospace; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.12); padding: 4px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
  }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #4EE; animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }

  /* SYNC STATUS BAR */
  .sync-bar {
    background: rgba(0,0,0,0.15); padding: 6px 32px;
    display: flex; align-items: center; gap: 10px; font-size: 11px; color: rgba(255,255,255,0.8);
    font-family: 'DM Mono', monospace;
  }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4EE; flex-shrink: 0; }
  .sync-dot.syncing { background: #FFD700; animation: pulse 0.8s infinite; }
  .sync-dot.error { background: #FF6B6B; }

  /* STATS BAR */
  .stats-bar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 16px 32px; display: flex; gap: 28px; flex-wrap: wrap; align-items: center;
  }
  .stat-item { display: flex; align-items: center; gap: 10px; }
  .stat-num { font-size: 26px; font-weight: 700; line-height: 1; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-item.liberado .stat-num { color: var(--green); }
  .stat-item.bloqueado .stat-num { color: var(--red); }
  .stat-item.em-analise .stat-num { color: var(--yellow); }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; min-height: 36px; }

  /* TOOLBAR */
  .toolbar { padding: 14px 32px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .btn-add {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; font-family: inherit;
  }
  .btn-add:hover { opacity: 0.88; }
  .btn-sync {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--surface); color: var(--accent); border: 1px solid var(--accent);
    border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; font-family: inherit;
  }
  .btn-sync:hover { background: var(--accent-light); }
  .search-box {
    flex: 1; min-width: 200px; max-width: 320px;
    display: flex; align-items: center; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; gap: 8px;
  }
  .search-box input { border: none; outline: none; background: transparent; font-size: 13px; padding: 9px 0; width: 100%; color: var(--text-primary); font-family: inherit; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font-size: 12px; color: var(--text-primary); cursor: pointer; font-family: inherit; outline: none; }
  .last-updated { margin-left: auto; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  /* CARDS */
  .cards-container { padding: 0 32px 40px; display: flex; flex-direction: column; gap: 14px; }
  .project-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; transition: box-shadow 0.2s;
  }
  .project-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 8px 24px rgba(0,0,0,0.06); }
  .project-card.is-liberado { border-left: 4px solid var(--green); }

  .card-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid transparent; cursor: pointer; user-select: none; transition: background 0.15s; }
  .card-header:hover { background: var(--bg); }
  .card-header.open { border-bottom-color: var(--border); }
  .card-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; background: var(--accent-light); color: var(--accent); }
  .card-title-group { flex: 1; min-width: 0; }
  .card-owner { font-weight: 600; font-size: 14px; }
  .card-lote { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .card-badges { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; white-space: nowrap; }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .badge-liberado { background: var(--green-bg); color: var(--green); }
  .badge-liberado .badge-dot { background: var(--green); }
  .badge-bloqueado { background: var(--red-bg); color: var(--red); }
  .badge-bloqueado .badge-dot { background: var(--red); }
  .badge-analise { background: var(--yellow-bg); color: var(--yellow); }
  .badge-analise .badge-dot { background: var(--yellow); }
  .badge-aguardando { background: var(--orange-bg); color: var(--orange); }
  .badge-aguardando .badge-dot { background: var(--orange); }
  .badge-financeiro-ok { background: var(--green-bg); color: var(--green); }
  .badge-financeiro-nok { background: var(--red-bg); color: var(--red); }
  .card-expand-btn { background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 16px; padding: 4px; transition: transform 0.2s; line-height: 1; }
  .card-expand-btn.open { transform: rotate(180deg); }

  /* CARD BODY */
  .card-body { display: none; padding: 18px 20px; }
  .card-body.open { display: block; }
  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); font-weight: 600; margin-bottom: 10px; margin-top: 18px; }
  .section-label:first-child { margin-top: 0; }

  .checklist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 8px; }
  .check-item { display: flex; align-items: center; gap: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
  .check-item label { font-size: 12px; font-weight: 500; color: var(--text-secondary); flex: 1; }
  .check-select { font-size: 12px; border: none; background: transparent; color: var(--text-primary); cursor: pointer; outline: none; font-family: inherit; font-weight: 600; max-width: 130px; }

  .dates-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 8px; }
  .date-field { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; }
  .date-field label { display: block; font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
  .date-field input { border: none; background: transparent; font-size: 12px; color: var(--text-primary); outline: none; font-family: 'DM Mono', monospace; width: 100%; cursor: pointer; }

  .status-final-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 16px; }
  .status-final-row label { font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  .status-final-select { font-size: 13px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); border-radius: 6px; padding: 7px 10px; cursor: pointer; outline: none; font-family: inherit; font-weight: 600; }
  .resultado-select { font-size: 13px; border: 1px solid var(--border); background: var(--surface); color: var(--text-primary); border-radius: 6px; padding: 7px 10px; cursor: pointer; outline: none; font-family: inherit; font-weight: 600; }
  .obs-area { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--text-primary); background: var(--bg); font-family: inherit; resize: vertical; min-height: 72px; outline: none; line-height: 1.6; transition: border-color 0.15s; }
  .obs-area:focus { border-color: var(--accent); background: var(--surface); }

  .card-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); }
  .btn-save { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
  .btn-save:hover { opacity: 0.88; }
  .btn-delete { display: inline-flex; align-items: center; gap: 6px; background: none; color: var(--red); border: 1px solid var(--red); border-radius: 7px; padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; }
  .btn-delete:hover { background: var(--red-bg); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,15,30,0.5); z-index: 900; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border-radius: 14px; padding: 26px; width: 100%; max-width: 540px; box-shadow: 0 24px 60px rgba(0,0,0,0.2); animation: modalIn 0.25s ease; }
  @keyframes modalIn { from{transform:scale(0.95);opacity:0;} to{transform:scale(1);opacity:1;} }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-field { display: flex; flex-direction: column; gap: 4px; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  .form-field input, .form-field select { border: 1px solid var(--border); border-radius: 7px; padding: 8px 10px; font-size: 13px; color: var(--text-primary); background: var(--bg); outline: none; font-family: inherit; transition: border-color 0.15s; }
  .form-field input:focus, .form-field select:focus { border-color: var(--accent); background: var(--surface); }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .btn-cancel { background: none; border: 1px solid var(--border); color: var(--text-secondary); border-radius: 7px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-cancel:hover { background: var(--bg); }

  /* TOAST */

  .countdown { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; margin-top:4px; }
  .countdown.ok { background:#e8f5e9; color:#2e7d32; }
  .countdown.warn { background:#fff8e1; color:#f57c00; }
  .countdown.danger { background:#ffebee; color:#c62828; }
  .del-modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:2000; align-items:center; justify-content:center; }
  .del-modal-overlay.open { display:flex; }
  .del-modal { background:var(--surface); border-radius:14px; padding:28px; width:100%; max-width:400px; box-shadow:0 24px 60px rgba(0,0,0,0.25); }
  .del-modal h3 { font-size:16px; font-weight:700; color:var(--red); margin-bottom:6px; }
  .del-modal p { font-size:13px; color:var(--text-secondary); margin-bottom:16px; line-height:1.5; }
  .del-project-name { font-weight:700; color:var(--text-primary); }
  .del-password-field { margin-bottom:10px; }
  .del-password-field label { display:block; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--text-muted); margin-bottom:5px; }
  .del-password-field input { width:100%; border:1px solid var(--border); border-radius:7px; padding:9px 12px; font-size:14px; font-family:inherit; outline:none; background:var(--bg); color:var(--text-primary); transition:border-color 0.15s; }
  .del-password-field input:focus { border-color:var(--red); }
  .del-error { color:var(--red); font-size:12px; margin-bottom:10px; display:none; }
  .del-actions { display:flex; gap:10px; justify-content:flex-end; }

  .attach-section { margin-top:4px; }
  .attach-list { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .attach-item { display:flex; align-items:center; gap:6px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:6px 10px; font-size:12px; }
  .attach-item a { color:var(--accent); text-decoration:none; font-weight:500; max-width:180px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .attach-item button { background:none; border:none; color:var(--red); cursor:pointer; font-size:13px; padding:0; line-height:1; }
  .btn-attach { display:inline-flex; align-items:center; gap:6px; background:var(--bg); color:var(--text-secondary); border:1px dashed var(--border); border-radius:7px; padding:7px 12px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; transition:border-color 0.15s; }
  .btn-attach:hover { border-color:var(--accent); color:var(--accent); }

  .toast { position: fixed; bottom: 20px; right: 20px; z-index: 1001; background: var(--text-primary); color: #fff; padding: 11px 16px; border-radius: 9px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.3s, transform 0.3s; transform: translateY(10px); display: flex; align-items: center; gap: 8px; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: var(--green); }
  .toast.error { background: var(--red); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 40px; margin-bottom: 10px; }

  @media (max-width: 600px) {
    .header-inner, .stats-bar, .toolbar, .cards-container { padding-left: 14px; padding-right: 14px; }
    .modal-grid { grid-template-columns: 1fr; }
    .header-right { display: none; }
  }
</style>
<script src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script src="https://accounts.google.com/gsi/client" onload="gsiLoaded()"></script>
</head>

<script>
// ─── CONFIG GOOGLE SHEETS ─────────────────────────────────────────────────────
const SHEET_ID   = '1QCfF-Kk-Ha3qRg5s7lXJXXc2bQeq-URYHJAAHKP7-oc';
const API_KEY    = 'AIzaSyAtONGbdmfX5MwNYykGq7S5GRwEwxTZRFU';
const SHEET_NAME = 'Controle de Projetos';
const RANGE      = `${SHEET_NAME}!A1:S200`;
const BASE_URL   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}`;

// Colunas esperadas na planilha (linha 1 = cabeçalho, linha 2+ = dados)
// A  B      C    D(financeiro) E(recebimento) F(projetoArq) G(artRrt) H(certidao) I(memorial)
// J(boleto) K(pagamento) L(inicioAnalise) M(resultado) N(parecer) O(alvara)
// P(artExec) Q(assinatura) R(statusFinal) S(obs) T(plantaAprovada) U(alvaraConstru)

let projects = [];
let nextId = 100;
let autoSyncInterval = null;

// ─── SHEETS API ───────────────────────────────────────────────────────────────
function setSyncStatus(status, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = msg;
}

async function fetchFromSheets() {
  setSyncStatus('syncing', 'Sincronizando com Google Sheets…');
  const url = `${BASE_URL}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
  const res = await fetch(url);
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Erro ao buscar dados');
  }
  const data = await res.json();
  return data.values || [];
}

async function writeToSheets(rows) {
  // Escreve todas as linhas (sobrescreve)
  const url = `${BASE_URL}/values/${encodeURIComponent(RANGE)}?valueInputOption=RAW&key=${API_KEY}`;
  const res = await fetch(url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ values: rows })
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({error:{message:'Erro desconhecido'}}));
    throw new Error(err.error?.message || 'Erro ao salvar');
  }
  return res.json();
}

function sheetsToProjects(rows) {
  if (!rows || rows.length < 2) return [];
  // Pula cabeçalho (linha 0)
  return rows.slice(1).filter(r => r && r[0]).map((r, i) => ({
    id: i + 1,
    owner:           r[0]  || '',
    quadra:          r[1]  || '',
    lote:            r[2]  || '',
    financeiro:      r[3]  || 'Adimplente',
    recebimento:     r[4]  || '',
    projetoArq:      r[5]  || 'Não',
    artRrt:          r[6]  || 'Não',
    certidao:        r[7]  || 'Não',
    memorial:        r[8]  || 'Não',
    boleto:          r[9]  || '',
    pagamento:       r[10] || '',
    inicioAnalise:   r[11] || '',
    resultado:       r[12] || 'Não Iniciado',
    parecerAprovacao:r[13] || '',
    alvaraMunicipal: r[14] || '',
    artExecucao:     r[15] || 'Não',
    assinaturaTermo: r[16] || '',
    statusFinal:     r[17] || 'Não Iniciado',
    obs:             r[18] || '',
    plantaAprovada:  r[19] || 'Não Entregue',
    alvaraConstru:   r[20] || 'Não Emitido',
    attachments:     r[21] || '[]',
  }));
}

function projectsToRows(ps) {
  const header = [
    'Identificação do Proprietário','Quadra','Lote','Status Financeiro',
    'Data de Recebimento','Projeto Arquitetônico','ART/RRT de Projeto',
    'Certidão / Contrato','Memorial Descritivo','Data de Emissão do Boleto',
    'Data de Pagamento da Taxa','Data de Início da Análise','Resultado da Análise',
    'Data do Parecer de Aprovação','Data do Alvará Municipal','ART de Execução',
    'Data de Assinatura do Termo','Status Final da Obra','Observações'
  ];
  const dataRows = ps.map(p => [
    p.owner, p.quadra, p.lote, p.financeiro, p.recebimento,
    p.projetoArq, p.artRrt, p.certidao, p.memorial,
    p.boleto, p.pagamento, p.inicioAnalise, p.resultado,
    p.parecerAprovacao, p.alvaraMunicipal, p.artExecucao, p.assinaturaTermo,
    p.statusFinal, p.obs, p.plantaAprovada, p.alvaraConstru, p.attachments
  ]);
  return [header, ...dataRows];
}

async function syncFromSheets() {
  try {
    // Preserve open cards before re-render
    const openIds = new Set();
    document.querySelectorAll('.card-body.open').forEach(el => openIds.add(el.id.replace('body-','')));
    const rows = await fetchFromSheets();
    projects = sheetsToProjects(rows);
    nextId = projects.length + 100;
    render();
    updateStats();
    checkGlobalAlert();
    // Re-open cards that were open
    openIds.forEach(id => {
      const body = document.getElementById('body-'+id);
      const btn  = document.getElementById('btn-'+id);
      const hdr  = document.getElementById('hdr-'+id);
      if (body) { body.classList.add('open'); btn.classList.add('open'); hdr.classList.add('open'); }
    });
    setSyncStatus('ok', `Sincronizado com Google Sheets — ${new Date().toLocaleTimeString('pt-BR')}`);
    document.getElementById('last-updated').textContent = 'Última sync: ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    setSyncStatus('error', 'Erro ao sincronizar: ' + e.message);
    showToast('❌ ' + e.message, 'error');
  }
}

// ─── CONTADOR 7 DIAS ÚTEIS ───────────────────────────────────────────────────
function calcWorkdaysLeft(dateStr) {
  if (!dateStr) return null;
  const start = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  let count = 0; let d = new Date(start);
  while (count < 7) {
    d.setDate(d.getDate() + 1);
    const dow = d.getDay();
    if (dow !== 0 && dow !== 6) count++;
  }
  const deadline = d;
  const diff = Math.ceil((deadline - today) / 86400000);
  return diff;
}
function countdownBadge(dateStr) {
  if (!dateStr) return '';
  const diff = calcWorkdaysLeft(dateStr);
  if (diff > 7)  return `<span class="countdown ok">⏱ ${diff}d restantes</span>`;
  if (diff > 0)  return `<span class="countdown warn">⚠️ ${diff}d restantes</span>`;
  if (diff === 0) return `<span class="countdown danger">🔴 Vence hoje!</span>`;
  return `<span class="countdown danger">🔴 Prazo esgotado (${Math.abs(diff)}d)</span>`;
}

}

// ─── INTERAÇÕES ──────────────────────────────────────────────────────────────
function toggleCard(id) {
  const body = document.getElementById('body-'+id);
  const btn  = document.getElementById('btn-'+id);
  const hdr  = document.getElementById('hdr-'+id);
  body.classList.toggle('open');
  btn.classList.toggle('open');
  hdr.classList.toggle('open');
}

function updateField(id, field, value) {
  const p = projects.find(x=>x.id===id);
  if (p) p[field] = value;
}

function updateStatusFinal(id, value) {
  const p = projects.find(x=>x.id===id);
  if (!p) return;
  p.statusFinal = value;
  const isOpen = document.getElementById('body-'+id).classList.contains('open');
  document.getElementById('card-'+id).outerHTML = buildCard(p);
  if (isOpen) {
    document.getElementById('body-'+id).classList.add('open');
    document.getElementById('btn-'+id).classList.add('open');
    document.getElementById('hdr-'+id).classList.add('open');
  }
  updateStats();
  checkGlobalAlert();
}

async function saveCard(id) {
  const body = document.getElementById('body-'+id);
  if (body) { const ta = body.querySelector('.obs-area'); if (ta) updateField(id,'obs',ta.value); }
  await saveAllToSheets();
  updateStats();
  checkGlobalAlert();
  const p = projects.find(x=>x.id===id);
  const isOpen = document.getElementById('body-'+id).classList.contains('open');
  document.getElementById('card-'+id).outerHTML = buildCard(p);
  if (isOpen) {
    document.getElementById('body-'+id).classList.add('open');
    document.getElementById('btn-'+id).classList.add('open');
    document.getElementById('hdr-'+id).classList.add('open');
  }
}

function deleteProject(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById('del-project-name').textContent = p.owner + ' — ' + p.quadra + ' / ' + p.lote;
  document.getElementById('del-password-input').value = '';
  document.getElementById('del-error').style.display = 'none';
  document.getElementById('del-modal').dataset.targetId = id;
  document.getElementById('del-modal').classList.add('open');
}
async function confirmDelete() {
  const pwd = document.getElementById('del-password-input').value;
  if (pwd !== 'CRISTAL') {
    document.getElementById('del-error').style.display = 'block';
    return;
  }
  const id = parseInt(document.getElementById('del-modal').dataset.targetId);
  document.getElementById('del-modal').classList.remove('open');
  projects = projects.filter(x => x.id !== id);
  await saveAllToSheets();
  updateStats();
  checkGlobalAlert();
  render();
  showToast('🗑 Projeto removido.', '');
}
function cancelDelete() {
  document.getElementById('del-modal').classList.remove('open');
}

// Initialize GAPI
function gapiLoaded() {
  gapi.load('picker', () => { pickerInited = true; });
}
function gsiLoaded() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: PICKER_CLIENT_ID,
    scope: PICKER_SCOPE,
    callback: '',
  });
  gapiInited = true;
}

function triggerAttach(projId) {
  currentPickerProjId = projId;
  if (!pickerInited || !gapiInited) {
    showToast('⏳ Carregando Google Drive...');
    setTimeout(() => triggerAttach(projId), 1000);
    return;
  }
  tokenClient.callback = async (resp) => {
    if (resp.error) { showToast('❌ Erro de autenticação'); return; }
    createPicker(resp.access_token);
  };
  if (gapi.client && gapi.client.getToken && gapi.client.getToken() === null) {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  } else {
    tokenClient.requestAccessToken({ prompt: '' });
  }
}

function createPicker(token) {
  const uploadView = new google.picker.DocsUploadView()
    .setParent(DRIVE_FOLDER_ID);
  const docsView = new google.picker.DocsView()
    .setParent(DRIVE_FOLDER_ID)
    .setIncludeFolders(false);
  const picker = new google.picker.PickerBuilder()
    .addView(uploadView)
    .addView(docsView)
    .setOAuthToken(token)
    .setDeveloperKey(PICKER_API_KEY)
    .setCallback(pickerCallback)
    .setTitle('Selecionar ou enviar documento')
    .build();
  picker.setVisible(true);
}

async function pickerCallback(data) {
  if (data.action !== google.picker.Action.PICKED) return;
  const projId = currentPickerProjId;
  const list = getAttachments(projId);
  for (const doc of data.docs) {
    try {
      await fetch(`https://www.googleapis.com/drive/v3/files/${doc.id}/permissions`, {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + gapi.client.getToken().access_token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ role: 'reader', type: 'anyone' })
      });
    } catch(e) {}
    list.push({
      name: doc.name,
      fileId: doc.id,
      url: `https://drive.google.com/file/d/${doc.id}/view`
    });
  }
  // Save to project and immediately sync to Sheets
  const p = projects.find(x => x.id === projId);
  if (p) {
    p.attachments = JSON.stringify(list);
    await saveAllToSheets();
  }
  renderAttachments(projId);
  showToast('✅ ' + data.docs.length + ' arquivo(s) anexado(s) e salvo(s)!');
}

function filterCards() {
  const q  = document.getElementById('search-input').value.toLowerCase();
  const sf = document.getElementById('filter-status').value;
  const ff = document.getElementById('filter-financeiro').value;
  const filtered = projects.filter(p => {
    const mQ = !q || p.owner.toLowerCase().includes(q) || p.quadra.toLowerCase().includes(q) || p.lote.toLowerCase().includes(q);
    const mS = !sf || p.statusFinal === sf;
    const mF = !ff || p.financeiro === ff;
    return mQ && mS && mF;
  });
  render(filtered);
}
